spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_CLIENT_ID}
            client-secret: ${OAUTH_SECRET}
            redirect-uri: ${OAUTH_REDIRECT_URI}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: aucjangpan-api-images
    stack:
      auto: false
    cloudfront:
      domain: ${CLOUDFRONT_DOMAIN_KEY}
    sqs:
      url:
        auction-end-queue: ${AUCTION_END_SQS_URL}
        auction-req-queue-fifo: ${AUCTION_REQ_SQS_URL}
    scheduler:
      arn:
        schedule-role: ${SCHEDULE_ROLE_ARN}
        sqs-queue: ${AUCTION_END_SQS_ARN}
      access-key-id: ${SQS_ACCESS_KEY}
      secret-access-key: ${SQS_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info

metrics:
  export:
    prometheus:
      enabled: true

toss:
  secret-key: ${TOSS_SECRET_KEY}

api:
  host: ${EC2_HOST}

openai:
  api:
    key: ${OPENAI_KEY}
    url: https://api.openai.com/v1/chat/completions
naver:
  api:
    id: ${NAVER_ID}
    secret: ${NAVER_SECRET}
    url: https://openapi.naver.com/v1/search/shop.json

settlement:
  email: ${ADMIN_EMAIL}