<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Chat</title>
</head>
<body>
<h1>Login</h1>
<form id="loginForm">
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit">Login</button>
</form>
<button id="chatRoomListBtn" type="button">채팅방 목록</button>
<div id="chatRoomList"></div>

<hr>
<h2>📨 실시간 채팅 테스트</h2>

<div>
    <label>Seller ID (채팅 요청 대상): </label>
    <input type="text" id="sellerId" placeholder="예: 2" />
</div>
<button onclick="requestChatRoom()">채팅 요청</button>

<br><br>

<div id="chatControl">
    <span id="connectionStatus" style="margin-right: 10px;">연결 끊김</span>
    <button id="exitBtn" style="display:none;" onclick="disconnect()">나가기</button>
</div>

<div id="chatSection" style="display:none;">
    <input type="text" id="messageInput" placeholder="메시지 입력" />
    <button onclick="sendMessage()">전송</button>
    <ul id="chatMessages"></ul>
</div>

<!-- STOMP 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
    let stompClient = null;
    let currentChatRoomId = null;

    // 로그인 처리
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const API_HOST = /*[[${@environment.getProperty('api.host')}]]*/ "test";
        const API_URL = `http://${API_HOST}:8080/api/v1/auth/login`;

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => {
                if (!response.ok) throw new Error('로그인 실패');
                const jwtToken = response.headers.get('Authorization');
                if (jwtToken) {
                    sessionStorage.setItem("jwt", jwtToken);
                    alert("로그인 성공!");
                } else {
                    throw new Error('JWT 토큰 없음');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('로그인 실패');
            });
    });

    // 채팅방 요청
    function requestChatRoom() {
        const jwt = sessionStorage.getItem("jwt");
        const sellerId = document.getElementById("sellerId").value;

        const API_HOST = /*[[${@environment.getProperty('api.host')}]]*/ "localhost";
        const API_URL = `http://${API_HOST}:8080/api/v1/chatRoom`;

        fetch(API_URL, {
            method: "POST",
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + jwt
            },
            body: JSON.stringify({ sellerId: sellerId })
        })
            .then(res => res.json())
            .then(data => {
                currentChatRoomId = data.chatRoomId;
                console.log("채팅방 정보:", data);

                clearMessages();

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        showMessage(msg);
                    });
                }

                connectStomp(currentChatRoomId);
                document.getElementById("chatSection").style.display = "block";
            })
            .catch(err => {
                console.error("채팅방 요청 실패", err);
            });
    }

    // STOMP 연결
    function connectStomp(chatRoomId) {

        if (stompClient !== null) {
            stompClient.disconnect();
            stompClient = null;
        }

        const token = sessionStorage.getItem("jwt");
        const API_HOST = /*[[${@environment.getProperty('api.host')}]]*/ "localhost";
        const API_URL = `http://${API_HOST}:8080/chat/inbox`;

        const socket = new SockJS(API_URL);
        stompClient = Stomp.over(socket);

        const headers = {
            Authorization: "Bearer " + token
        };

        stompClient.connect(headers, function (frame) {
            console.log("Connected: " + frame);

            stompClient.subscribe(`/sub/channel/${chatRoomId}`, function (message) {
                const msg = JSON.parse(message.body);
                showMessage(msg);
            });

            document.getElementById("exitBtn").style.display = "inline-block";
            document.getElementById("connectionStatus").textContent = "✅ 연결됨";
        });
    }

    // 메시지 전송
    function sendMessage() {
        const content = document.getElementById("messageInput").value;

        if (!currentChatRoomId) {
            alert("채팅방 없음. 먼저 채팅 요청하세요.");
            return;
        }

        stompClient.send("/pub/v2/message", {
            Authorization: "Bearer " + sessionStorage.getItem("jwt")
        }, JSON.stringify({
            chatRoomId: currentChatRoomId,
            content: content
        }));

        document.getElementById("messageInput").value = "";
    }

    // 연결 끊기
    function disconnect() {
        if (stompClient !== null) {
            stompClient.disconnect(() => {
                console.log("Disconnected from chat room");
                document.getElementById("exitBtn").style.display = "none";
                document.getElementById("chatSection").style.display = "none";
                document.getElementById("connectionStatus").textContent = "❌ 연결 끊김";
                clearMessages();
                currentChatRoomId = null;
            });
            stompClient = null;
        }
    }

    // 메시지 초기화
    function clearMessages() {
        const chatMessages = document.getElementById("chatMessages");
        while (chatMessages.firstChild) {
            chatMessages.removeChild(chatMessages.firstChild);
        }
    }

    // 메시지 출력
    function showMessage(msg) {
        const messageEl = document.createElement("li");
        messageEl.textContent = `${msg.nickname}: ${msg.content}`;
        document.getElementById("chatMessages").appendChild(messageEl);
    }

    document.getElementById("chatRoomListBtn").addEventListener("click", () => {
        loadChatRooms(0);
    });

    // 채팅방 목록 조회 및 페이징 처리
    function loadChatRooms(pageNum) {
        const jwt = sessionStorage.getItem("jwt");
        const API_HOST = /*[[${@environment.getProperty('api.host')}]]*/ "localhost";
        const API_URL = `http://${API_HOST}:8080/api/v1/chatRoom?page=${pageNum}`;

        fetch(API_URL, {
            method: "GET",
            headers: {
                'Authorization': 'Bearer ' + jwt
            }
        })
            .then(res => res.json())
            .then(data => {
                const listDiv = document.getElementById("chatRoomList");
                listDiv.innerHTML = ""; // 초기화

                const ul = document.createElement("ul");
                data.data.forEach(room => {
                    const li = document.createElement("li");
                    const btn = document.createElement("button");
                    btn.textContent = `${room.opponentNickname} 님과의 채팅`;
                    btn.onclick = () => {
                        document.getElementById("sellerId").value = room.opponentUserId; // 숨겨진 input 없이 바로 설정
                        requestChatRoom(); // 기존 함수 재활용
                    };
                    li.appendChild(btn);
                    ul.appendChild(li);
                });
                listDiv.appendChild(ul);

                // 간단한 페이징 버튼
                const page = data.page;
                if (page.totalPage > 1) {
                    const pageDiv = document.createElement("div");
                    for (let i = 0; i < page.totalPage; i++) {
                        const btn = document.createElement("button");
                        btn.textContent = i + 1;
                        if (i === page.pageNum) btn.style.fontWeight = "bold";
                        btn.onclick = () => loadChatRooms(i);
                        pageDiv.appendChild(btn);
                    }
                    listDiv.appendChild(pageDiv);
                }
            })
            .catch(err => {
                console.error("채팅방 목록 조회 실패", err);
            });
    }
</script>
</body>
</html>
